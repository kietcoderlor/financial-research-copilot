# Phase 1–2: build image, push to ECR, force new ECS deployment for API + ingestion worker (same image).
# Prerequisites (AWS console / IaC): ECR repo `financial-copilot-api`, ECS cluster `financial-copilot`,
# services matching env vars below. GitHub repo secrets:
#   AWS_ACCESS_KEY_ID, AWS_SECRET_ACCESS_KEY
#
# Task definition should reference this ECR image (e.g. :latest); force-new-deployment pulls the new digest.

name: Deploy API and worker

on:
  push:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: deploy-api-${{ github.ref }}
  cancel-in-progress: false

env:
  AWS_REGION: us-east-1
  ECR_REPOSITORY: financial-copilot-api
  ECS_CLUSTER: financial-copilot
  ECS_SERVICE_API: financial-copilot-api
  ECS_SERVICE_WORKER: financial-copilot-worker

jobs:
  deploy:
    runs-on: ubuntu-latest
    timeout-minutes: 60
    permissions:
      contents: read

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Login to Amazon ECR
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v2

      - name: Build, tag, and push image
        id: build-image
        env:
          ECR_REGISTRY: ${{ steps.login-ecr.outputs.registry }}
          IMAGE_TAG: ${{ github.sha }}
        run: |
          docker build -t "$ECR_REGISTRY/$ECR_REPOSITORY:$IMAGE_TAG" .
          docker push "$ECR_REGISTRY/$ECR_REPOSITORY:$IMAGE_TAG"
          docker tag "$ECR_REGISTRY/$ECR_REPOSITORY:$IMAGE_TAG" "$ECR_REGISTRY/$ECR_REPOSITORY:latest"
          docker push "$ECR_REGISTRY/$ECR_REPOSITORY:latest"
          echo "image=$ECR_REGISTRY/$ECR_REPOSITORY:$IMAGE_TAG" >> "$GITHUB_OUTPUT"

      - name: Force new ECS deployment (API + worker)
        run: |
          aws ecs update-service \
            --cluster "$ECS_CLUSTER" \
            --service "$ECS_SERVICE_API" \
            --force-new-deployment \
            --region "$AWS_REGION"
          aws ecs update-service \
            --cluster "$ECS_CLUSTER" \
            --service "$ECS_SERVICE_WORKER" \
            --force-new-deployment \
            --region "$AWS_REGION"

      - name: Wait for ECS service stability
        run: |
          aws ecs wait services-stable \
            --cluster "$ECS_CLUSTER" \
            --services "$ECS_SERVICE_API" "$ECS_SERVICE_WORKER" \
            --region "$AWS_REGION"
