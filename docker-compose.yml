services:
  api:
    build: .
    ports:
      - "8000:8000"
    environment:
      APP_ENV: development
      LOG_LEVEL: INFO
      DB_URL: postgresql+asyncpg://postgres:postgres@postgres:5432/copilot
      REDIS_URL: redis://redis:6379
      AWS_REGION: us-east-1
      AWS_ACCESS_KEY_ID: test
      AWS_SECRET_ACCESS_KEY: test
      SQS_QUEUE_URL: http://elasticmq:9324/000000000000/ingestion-queue
      SQS_ENDPOINT_URL: http://elasticmq:9324
      S3_BUCKET: financial-copilot-raw-docs
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_started
      elasticmq:
        condition: service_started

  worker:
    build: .
    command: ["python", "-m", "app.ingestion.worker"]
    environment:
      APP_ENV: development
      LOG_LEVEL: INFO
      DB_URL: postgresql+asyncpg://postgres:postgres@postgres:5432/copilot
      AWS_REGION: us-east-1
      AWS_ACCESS_KEY_ID: test
      AWS_SECRET_ACCESS_KEY: test
      SQS_QUEUE_URL: http://elasticmq:9324/000000000000/ingestion-queue
      SQS_ENDPOINT_URL: http://elasticmq:9324
      S3_BUCKET: financial-copilot-raw-docs
    depends_on:
      postgres:
        condition: service_healthy
      elasticmq:
        condition: service_started

  postgres:
    image: ankane/pgvector:latest
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: copilot
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d copilot"]
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"

  elasticmq:
    image: softwaremill/elasticmq:1.6.7
    ports:
      - "9324:9324"
      - "9325:9325"
    volumes:
      - ./elasticmq.conf:/opt/elasticmq.conf

volumes:
  pgdata:
