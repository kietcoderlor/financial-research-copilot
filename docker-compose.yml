services:
  api:
    build: .
    ports:
      - "8000:8000"
    env_file:
      - .env
    environment:
      APP_ENV: development
      LOG_LEVEL: INFO
      DB_URL: postgresql+asyncpg://postgres:postgres@postgres:5432/copilot
      REDIS_URL: redis://redis:6379
      AWS_REGION: us-east-1
      AWS_ACCESS_KEY_ID: minioadmin
      AWS_SECRET_ACCESS_KEY: minioadmin
      SQS_QUEUE_URL: http://elasticmq:9324/000000000000/ingestion-queue
      SQS_ENDPOINT_URL: http://elasticmq:9324
      S3_BUCKET: financial-copilot-raw-docs
      S3_ENDPOINT_URL: http://minio:9000
      QUERY_CACHE_TTL_SECONDS: "3600"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_started
      elasticmq:
        condition: service_started
      minio-init:
        condition: service_completed_successfully

  worker:
    build: .
    command: ["python", "-m", "app.ingestion.worker"]
    env_file:
      - .env
    environment:
      APP_ENV: development
      LOG_LEVEL: INFO
      DB_URL: postgresql+asyncpg://postgres:postgres@postgres:5432/copilot
      AWS_REGION: us-east-1
      AWS_ACCESS_KEY_ID: minioadmin
      AWS_SECRET_ACCESS_KEY: minioadmin
      SQS_QUEUE_URL: http://elasticmq:9324/000000000000/ingestion-queue
      SQS_ENDPOINT_URL: http://elasticmq:9324
      S3_BUCKET: financial-copilot-raw-docs
      S3_ENDPOINT_URL: http://minio:9000
    depends_on:
      postgres:
        condition: service_healthy
      elasticmq:
        condition: service_started
      minio-init:
        condition: service_completed_successfully

  postgres:
    image: ankane/pgvector:latest
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: copilot
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d copilot"]
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"

  elasticmq:
    image: softwaremill/elasticmq:1.6.7
    ports:
      - "9324:9324"
      - "9325:9325"
    volumes:
      - ./elasticmq.conf:/opt/elasticmq.conf

  minio:
    image: minio/minio:latest
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - miniodata:/data
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 5s
      timeout: 5s
      retries: 5
      start_period: 5s

  minio-init:
    image: minio/mc:latest
    depends_on:
      minio:
        condition: service_started
    entrypoint: >
      /bin/sh -c "
      until mc alias set local http://minio:9000 minioadmin minioadmin; do sleep 1; done;
      mc mb local/financial-copilot-raw-docs --ignore-existing;
      exit 0;
      "

volumes:
  pgdata:
  miniodata:
