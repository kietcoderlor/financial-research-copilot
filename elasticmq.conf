# ElasticMQ — local SQS-compatible queue (Phase 1 dev)
include classpath("application.conf")

queues {
  ingestion-queue {
    defaultVisibilityTimeout = 600 seconds
    deadLettersQueue {
      name = "ingestion-dlq"
      maxReceiveCount = 3
    }
  }
  ingestion-dlq {
    defaultVisibilityTimeout = 30 seconds
  }
}
